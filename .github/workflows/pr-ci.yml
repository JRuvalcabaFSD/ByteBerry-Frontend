name: 🔍 PR-CI - ByteBerry Frontend

on:
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'src/**'
      - 'test/**'
      - 'public/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig*.json'
      - 'vitest.config.ts'
      - 'vite.config.ts'
      - 'eslint.config.mjs'
      - 'Dockerfile'
      - '.github/workflows/**'

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22.18.0'
  PNPM_VERSION: '10.17.1'

jobs:
  setup:
    name: 📦 Setup & Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 💾 Cache node_modules
        uses: actions/cache/save@v3
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 💾 Restore node_modules
        uses: actions/cache/restore@v3
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: 🔍 Run ESLint
        run: pnpm lint

      - name: 🔍 Check TypeScript types
        run: pnpm type-check

      - name: 📊 Generate lint report
        if: always()
        run: |
          echo "📊 ESLint Summary:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          pnpm lint 2>&1 | head -20 >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  build:
    name: 🗂️ Build
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 💾 Restore node_modules
        uses: actions/cache/restore@v3
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: 🗂️ Build with Vite
        run: |
          export VITE_BFF_URL=${{ secrets.VITE_BFF_URL_CI || 'http://localhost:4002' }}
          export VITE_NODE_ENV=production

          echo "🔧 Environment variables:"
          echo "VITE_BFF_URL=$VITE_BFF_URL"
          echo "VITE_NODE_ENV=$VITE_NODE_ENV"
          echo ""

          echo "📦 Starting build..."
          pnpm build

          echo ""
          echo "✅ Build completed"

      - name: 🔍 Debug - Show directory structure
        if: always()
        run: |
          echo "📁 Current directory:"
          pwd
          echo ""
          echo "📂 Root directory contents:"
          ls -la
          echo ""
          echo "📦 Checking for dist directory..."
          if [ -d "dist" ]; then
            echo "✅ dist/ exists"
            echo ""
            echo "📁 dist/ contents:"
            ls -la dist/
            echo ""
            echo "📄 All files in dist/ (recursive):"
            find dist/ -type f 2>/dev/null | head -30
            echo ""
            echo "📁 All directories in dist/:"
            find dist/ -type d 2>/dev/null
          else
            echo "❌ dist/ does NOT exist!"
            echo ""
            echo "🔍 Searching for any build output..."
            find . -name "index.html" -o -name "*.js" -o -name "*.css" 2>/dev/null | grep -v node_modules | head -20
          fi

      - name: 📊 Verify build output
        run: |
          echo "🔍 Verifying build artifacts..."

          # Verificar que dist/ existe
          if [ ! -d "dist" ]; then
            echo "❌ ERROR: dist/ directory does not exist!"
            echo ""
            echo "📁 Current directory contents:"
            ls -la
            echo ""
            echo "🔍 Searching for build output..."
            find . -maxdepth 2 -type d | grep -v node_modules
            exit 1
          fi
          echo "✅ dist/ directory exists"
          echo ""

          # Mostrar contenido de dist/
          echo "📁 dist/ directory contents:"
          ls -la dist/
          echo ""

          # Verificar index.html
          if [ ! -f "dist/index.html" ]; then
            echo "❌ ERROR: dist/index.html not found!"
            echo ""
            echo "📄 Files in dist/:"
            find dist/ -type f 2>/dev/null || echo "No files found"
            exit 1
          fi
          echo "✅ index.html exists"

          # Verificar assets/ (warning, no error)
          if [ ! -d "dist/assets" ]; then
            echo "⚠️  WARNING: dist/assets/ directory not found"
            echo ""
            echo "📁 Directories in dist/:"
            find dist/ -type d 2>/dev/null || echo "No directories found"
            echo ""
            echo "ℹ️  This might be OK if Vite is using a different structure"
          else
            echo "✅ assets/ directory exists"
            echo ""
            echo "📄 Sample files in assets/:"
            find dist/assets -type f 2>/dev/null | head -10
          fi

          echo ""
          echo "📦 Total build size:"
          du -sh dist/
          echo ""

          echo "📊 Build summary:"
          echo "- HTML files: $(find dist/ -name "*.html" 2>/dev/null | wc -l)"
          echo "- JS files: $(find dist/ -name "*.js" 2>/dev/null | wc -l)"
          echo "- CSS files: $(find dist/ -name "*.css" 2>/dev/null | wc -l)"
          echo "- Other files: $(find dist/ -type f ! -name "*.html" ! -name "*.js" ! -name "*.css" 2>/dev/null | wc -l)"

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: dist/
          retention-days: 7
          if-no-files-found: error

  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: [setup, build]
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 💾 Restore node_modules
        uses: actions/cache/restore@v3
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: 🧪 Run tests with coverage
        run: |
          export VITE_BFF_URL=http://localhost:4002
          export VITE_NODE_ENV=test
          export CI=true
          pnpm test:coverage

      - name: 📊 Display coverage summary
        run: |
          echo "📊 Test Coverage Report:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          if [ -f "coverage/coverage-summary.json" ]; then
            cat coverage/coverage-summary.json | jq -r '
              .total |
              "Lines: " + (.lines.pct|tostring) + "%\n" +
              "Functions: " + (.functions.pct|tostring) + "%\n" +
              "Branches: " + (.branches.pct|tostring) + "%\n" +
              "Statements: " + (.statements.pct|tostring) + "%"
            ' >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage summary not available" >> $GITHUB_STEP_SUMMARY
          fi
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: 📈 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: frontend-service
          fail_ci_if_error: false

      - name: 📊 Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: coverage/
          retention-days: 7

  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 💾 Restore node_modules
        uses: actions/cache/restore@v3
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: 🔍 Run security audit
        run: |
          echo "🔍 Running pnpm audit..."
          pnpm audit --audit-level moderate --json > audit-results.json || AUDIT_EXIT_CODE=$?

          echo "📊 Security Audit Results:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY

          if [ -s audit-results.json ]; then
            echo "Audit completed. Checking results..." >> $GITHUB_STEP_SUMMARY

            VULN_COUNT=$(cat audit-results.json | jq -r '.metadata.vulnerabilities.total // 0' 2>/dev/null || echo "0")
            echo "Total vulnerabilities found: $VULN_COUNT" >> $GITHUB_STEP_SUMMARY

            if [ "$VULN_COUNT" != "0" ] && [ "$VULN_COUNT" != "null" ]; then
              echo "⚠️ Vulnerabilities detected" >> $GITHUB_STEP_SUMMARY
              cat audit-results.json | jq '.metadata.vulnerabilities' 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Details not available" >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ No vulnerabilities found" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "✅ No audit issues detected" >> $GITHUB_STEP_SUMMARY
          fi

          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

          if [ "${AUDIT_EXIT_CODE:-0}" -ne 0 ]; then
            echo "❌ Audit failed with critical vulnerabilities"
            exit $AUDIT_EXIT_CODE
          fi

      - name: 📊 Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-${{ github.sha }}
          path: audit-results.json
          retention-days: 30

  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [build, test]
    timeout-minutes: 15
    if: ${{ !github.event.pull_request.draft }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: dist/

      - name: 🔍 Verify downloaded artifacts
        run: |
          echo "🔍 Verifying downloaded build artifacts..."
          echo ""
          echo "📁 Current directory:"
          pwd
          ls -la
          echo ""
          echo "📦 dist/ contents:"
          ls -la dist/
          echo ""
          echo "📄 Files in dist/:"
          find dist/ -type f | head -20

      - name: 🗂️ Build Docker image
        run: |
          echo "🗂️ Building Docker image for PR verification..."
          docker build \
            --build-arg VITE_BFF_URL=${{ secrets.VITE_BFF_URL_CI || 'http://localhost:4002' }} \
            --build-arg VITE_NODE_ENV=production \
            --progress=plain \
            -t byteberry-frontend:pr-${{ github.event.pull_request.number }} .

      - name: 🧪 Test Docker image
        run: |
          echo "🧪 Testing Docker image..."

          docker run -d --name test-frontend-pr \
            -p 4003:80 \
            byteberry-frontend:pr-${{ github.event.pull_request.number }}

          echo "⏳ Waiting for Nginx to start..."
          sleep 15

          echo ""
          echo "📋 Container logs (last 20 lines):"
          docker logs --tail 20 test-frontend-pr

          echo ""
          echo "📁 Verifying files inside container:"
          docker exec test-frontend-pr ls -la /usr/share/nginx/html

          echo ""
          echo "🔍 Testing Nginx configuration first..."
          if docker exec test-frontend-pr nginx -t 2>&1 | grep -q "successful"; then
            echo "✅ Nginx configuration is valid"
          else
            echo "❌ Nginx configuration has errors:"
            docker exec test-frontend-pr nginx -t
            docker stop test-frontend-pr
            docker rm test-frontend-pr
            exit 1
          fi

          echo ""
          echo "🔍 Checking index.html content and permissions..."
          echo "File info:"
          docker exec test-frontend-pr ls -lh /usr/share/nginx/html/index.html
          echo ""
          echo "First 200 characters of index.html:"
          docker exec test-frontend-pr head -c 200 /usr/share/nginx/html/index.html
          echo ""
          echo "File size:"
          INDEX_SIZE=$(docker exec test-frontend-pr stat -c %s /usr/share/nginx/html/index.html)
          echo "$INDEX_SIZE bytes"

          if [ "$INDEX_SIZE" -lt 100 ]; then
            echo "❌ ERROR: index.html is too small ($INDEX_SIZE bytes)"
            echo "Full content:"
            docker exec test-frontend-pr cat /usr/share/nginx/html/index.html
            docker stop test-frontend-pr
            docker rm test-frontend-pr
            exit 1
          fi
          echo "✅ index.html size OK ($INDEX_SIZE bytes)"

          echo ""
          echo "🔍 Testing HTTP GET request (not HEAD)..."
          # ✅ CRÍTICO: Usar GET explícitamente y guardar respuesta
          HTTP_RESPONSE=$(docker exec test-frontend-pr wget -q -O - http://localhost:80/ 2>&1 | head -c 500)
          RESPONSE_LENGTH=${#HTTP_RESPONSE}

          echo "Response length: $RESPONSE_LENGTH characters"
          echo "First 200 chars of response:"
          echo "$HTTP_RESPONSE" | head -c 200
          echo ""

          if [ "$RESPONSE_LENGTH" -gt 100 ]; then
            echo "✅ HTTP GET returned content ($RESPONSE_LENGTH chars)"
          else
            echo "❌ HTTP GET returned empty or very small response"
            echo "Full response:"
            echo "$HTTP_RESPONSE"
            echo ""
            echo "Checking Nginx error logs:"
            docker exec test-frontend-pr cat /var/log/nginx/error.log 2>/dev/null || echo "No error log"
            echo ""
            echo "Checking Nginx access logs:"
            docker exec test-frontend-pr tail -20 /var/log/nginx/access.log 2>/dev/null || echo "No access log"
            docker stop test-frontend-pr
            docker rm test-frontend-pr
            exit 1
          fi

          echo ""
          echo "🔍 Verifying HTML content..."
          if echo "$HTTP_RESPONSE" | grep -q "<html"; then
            echo "✅ Response contains HTML"
          else
            echo "❌ Response does not contain HTML tag"
            echo "Response:"
            echo "$HTTP_RESPONSE"
            docker stop test-frontend-pr
            docker rm test-frontend-pr
            exit 1
          fi

          echo ""
          echo "🔍 Testing assets directory..."
          ASSETS_COUNT=$(docker exec test-frontend-pr find /usr/share/nginx/html/assets -type f 2>/dev/null | wc -l)
          echo "Assets files count: $ASSETS_COUNT"

          if [ "$ASSETS_COUNT" -gt 0 ]; then
            echo "✅ Assets directory contains $ASSETS_COUNT files"
            echo "Sample assets:"
            docker exec test-frontend-pr ls -lh /usr/share/nginx/html/assets/ | head -5
          else
            echo "⚠️  Warning: No files in assets/ directory"
          fi

          echo ""
          echo "🔍 Checking Nginx server configuration..."
          echo "Active Nginx config:"
          docker exec test-frontend-pr cat /etc/nginx/nginx.conf | head -30

          echo ""
          echo "🧹 Cleaning up..."
          docker stop test-frontend-pr
          docker rm test-frontend-pr

          echo ""
          echo "✅ All critical Docker tests passed!"

      - name: 🗑️ Clean up Docker images
        if: always()
        run: |
          docker rmi byteberry-frontend:pr-${{ github.event.pull_request.number }} || true
          docker system prune -f || true

  summary:
    name: 📋 PR Summary
    runs-on: ubuntu-latest
    needs: [quality, build, test, security, docker]
    if: always()

    steps:
      - name: 📊 Generate PR summary
        run: |
          echo "# 🔍 PR-CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Code Quality | ${{ needs.quality.result == 'success' && '✅' || '❌' }} | ${{ needs.quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🗂️ Build | ${{ needs.build.result == 'success' && '✅' || '❌' }} | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Tests | ${{ needs.test.result == 'success' && '✅' || '❌' }} | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 Security | ${{ needs.security.result == 'success' && '✅' || '❌' }} | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker | ${{ needs.docker.result == 'success' && '✅' || needs.docker.result == 'skipped' && '⭐️' || '❌' }} | ${{ needs.docker.result }} |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 Ready for merge?" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.quality.result }}" == "success" && "${{ needs.build.result }}" == "success" && "${{ needs.test.result }}" == "success" && "${{ needs.security.result }}" == "success" ]]; then
            echo "🎉 **All critical checks passed!** This PR is ready for review and merge." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some checks failed.** Please fix the issues before merging:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            [[ "${{ needs.quality.result }}" != "success" ]] && echo "- ❌ Code quality issues need to be resolved" >> $GITHUB_STEP_SUMMARY
            [[ "${{ needs.build.result }}" != "success" ]] && echo "- ❌ Build is failing" >> $GITHUB_STEP_SUMMARY
            [[ "${{ needs.test.result }}" != "success" ]] && echo "- ❌ Tests are failing" >> $GITHUB_STEP_SUMMARY
            [[ "${{ needs.security.result }}" != "success" ]] && echo "- ❌ Security vulnerabilities detected" >> $GITHUB_STEP_SUMMARY
          fi

      - name: ✅ All checks passed
        if: needs.quality.result == 'success' && needs.build.result == 'success' && needs.test.result == 'success' && needs.security.result == 'success'
        run: echo "🎉 All critical checks passed! PR ready for merge."

      - name: ❌ Some checks failed
        if: needs.quality.result == 'failure' || needs.build.result == 'failure' || needs.test.result == 'failure' || needs.security.result == 'failure'
        run: |
          echo "❌ Critical checks failed:"
          echo "  Quality: ${{ needs.quality.result }}"
          echo "  Build: ${{ needs.build.result }}"
          echo "  Test: ${{ needs.test.result }}"
          echo "  Security: ${{ needs.security.result }}"
          exit 1
